<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 대한변호사협회 법규집 ✨ ULTIMATE 5.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   INFOGRAPHIC DASHBOARD THEME (DEEP NAVY)
══════════════════════════════════════════════ */
:root{
  --sidebar-w: 460px;
  --bg-main: #020617; 
  --bg-panel: #0f172a; 
  --bg-card: #1e293b;
  --accent: #38bdf8; 
  --text-p: #f8fafc; 
  --text-s: #94a3b8; 
  --text-m: #475569; 
  --gold: #fbbf24; 
  --green: #10b981; 
  --purple: #818cf8; 
  --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.1);
}

*{box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing: antialiased;}
body{height:100vh; overflow:hidden; font-family:'Noto Sans KR',sans-serif; background:var(--bg-main); color:var(--text-p); display:flex;}

/* ── LEFT SIDEBAR (Infographic Layout) ── */
#left{
  width: var(--sidebar-w); min-width: var(--sidebar-w); height:100%;
  background: var(--bg-main); display:flex; flex-direction:column;
  border-right: 1px solid var(--border); z-index:100;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#left.collapsed { transform: translateX(calc(var(--sidebar-w) * -1)); margin-right: calc(var(--sidebar-w) * -1); }

/* Header & Stats Block */
.header-box{padding:30px 24px 20px; background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-main) 100%);}
.header-top{display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;}
.header-ttl{font-family:'Noto Serif KR',serif; font-size:24px; font-weight:700; letter-spacing:-1px; color:var(--text-p);}
.info-grid{display: grid; grid-template-columns: 1fr 1fr; gap: 10px;}
.info-item{background: var(--glass); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center;}
.info-val{display: block; font-size: 18px; font-weight: 700; color: var(--accent); font-family: monospace;}
.info-lab{display: block; font-size: 10px; color: var(--text-s); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;}

.tab-nav{display:flex; padding:0 20px; gap: 15px; border-bottom:1px solid var(--lb); background: var(--bg-main);}
.tab{padding:15px 5px; font-size:14px; color:var(--text-s); cursor:pointer; transition:0.2s; position:relative; font-weight: 500;}
.tab.on{color:var(--accent); font-weight:700;}
.tab.on::after{content:''; position:absolute; bottom:-1px; left:0; width:100%; height:3px; background:var(--accent); border-radius:3px 3px 0 0; box-shadow: 0 -2px 10px var(--accent);}

.search-container{padding:20px; background:var(--bg-main);}
.s-input-wrapper{position: relative; display: flex; align-items: center;}
.s-input{width:100%; padding:14px 18px; background:var(--bg-panel); border:1px solid var(--lb); border-radius:12px; color:var(--text-p); font-size:14.5px; outline:none; transition:0.3s;}
.s-input:focus{border-color:var(--accent); box-shadow: 0 0 0 4px rgba(56,189,248,0.15);}

/* Category Selector (Infographic Grid) */
.cat-container{padding: 0 20px 15px;}
.cat-grid{display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;}
.c-chip{padding: 8px 2px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--lb); color: var(--text-s); font-size: 10.5px; text-align: center; cursor: pointer; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.c-chip:hover{ border-color: var(--accent); color: var(--text-p); }
.c-chip.active{ background: var(--accent); color: var(--bg-main); font-weight: 700; border-color: var(--accent); box-shadow: 0 4px 12px rgba(56,189,248,0.3); }

.list-container{flex:1; overflow-y:auto; padding:15px; background:var(--bg-main);}
.reg-card{padding:20px; background:var(--bg-panel); border: 1px solid var(--border); border-radius:16px; cursor:pointer; margin-bottom:15px; transition:0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.15);}
.reg-card:hover{border-color:var(--accent); transform:translateY(-4px); background:rgba(255,255,255,0.02); box-shadow: 0 10px 25px rgba(0,0,0,0.3);}
.reg-card.active{border-color:var(--accent); background:rgba(56,189,248,0.06); box-shadow: inset 0 0 15px rgba(56,189,248,0.05);}
.reg-pg-tag{font-size:10px; color:var(--accent); font-weight: 800; margin-bottom:10px; letter-spacing:1px; background: rgba(56,189,248,0.1); width: fit-content; padding: 3px 8px; border-radius: 6px; text-transform: uppercase;}
.reg-name{font-size:15.5px; line-height:1.6; font-weight:600; word-break:keep-all; color:var(--text-p);}
.reg-snip{font-size:13px; color:var(--text-s); margin-top:14px; line-height:1.7; border-top: 1px solid var(--border); padding-top:14px; font-weight:300;}

/* Pagination */
.pager-box{padding:18px 24px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg-panel);}
.pager-btn{background: var(--glass); border: 1px solid var(--border); color: var(--text-p); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s;}
.pager-btn:hover{background: var(--accent); color: var(--bg-main); border-color: var(--accent);}

/* ── RIGHT VIEW ── */
#right{flex:1; display:flex; flex-direction:column; position:relative; background:#000; overflow:hidden;}
#matrix-rain{position:absolute; inset:0; z-index:0; pointer-events:none; opacity: 0.12;}

.top-nav{display:flex; align-items:center; gap:15px; padding:0 30px; height:70px; background:rgba(2,6,23,0.8); backdrop-filter:blur(30px); border-bottom:1px solid var(--border); z-index:20;}
.viewer-title{flex:1; font-size:16px; font-weight:600; font-family:'Noto Serif KR',serif; color:var(--text-p);}

.icon-btn{width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:var(--glass); border:1px solid var(--border); border-radius:12px; color:var(--accent); cursor:pointer; transition:0.3s; font-size:20px;}
.icon-btn:hover{background:var(--accent); color:var(--bg-main); transform: translateY(-2px);}

.ai-toggle-btn{background: linear-gradient(135deg, var(--accent), var(--purple)); border:none; color:white; padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(129,140,248,0.3); transition: 0.3s;}
.ai-toggle-btn:hover{transform: scale(1.05); box-shadow: 0 8px 30px rgba(129,140,248,0.5);}

#cvwrap{flex:1; overflow:auto; display:flex; justify-content:center; align-items: flex-start; padding:50px; position:relative; z-index:10; cursor: zoom-in; scroll-behavior: smooth;}
#pdf-canvas{box-shadow: 0 50px 150px rgba(0,0,0,1); background:#fff; display:none; border-radius:4px;}

/* AI Search Modal */
#aiModal{position:fixed; bottom:30px; right:30px; width:500px; height:700px; background:var(--bg-panel); border:1px solid var(--border); border-radius:28px; z-index:2000; display:none; flex-direction:column; box-shadow:0 30px 100px rgba(0,0,0,0.9); overflow:hidden; backdrop-filter: blur(20px);}
.ai-header{padding:25px 30px; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.ai-body{flex:1; overflow-y:auto; padding:30px; scroll-behavior: smooth;}
.ai-msg{padding:18px 22px; border-radius:20px; margin-bottom:24px; font-size:14.5px; line-height:1.8; max-width:92%; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
.ai-msg-ai{background:rgba(56,189,248,0.05); border-left:6px solid var(--accent); color:var(--text-p); border-top-left-radius:4px;}
.ai-msg-user{background:var(--bg-card); margin-left:auto; text-align:right; color:var(--accent); border-bottom-right-radius:4px;}

/* Jump Button in AI msg */
.jump-btn{display:inline-flex; align-items:center; gap:8px; margin-top:15px; padding:10px 18px; background:var(--accent); color:var(--bg-main); border-radius:10px; font-size:12.5px; font-weight:700; cursor:pointer; border:none; transition:0.2s;}
.jump-btn:hover{background:var(--text-p); transform: translateX(5px);}

.ai-input-box{padding:25px; background:var(--bg-main); border-top:1px solid var(--border); display:flex; gap:12px; align-items:center;}

#loading{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:500; text-align:center; width: 100%;}
.spin{width:60px; height:60px; border:6px solid rgba(56,189,248,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin: 0 auto;}

/* Recovery Glass UI */
.glass-panel { background: rgba(15,23,42,0.9); padding: 50px; border-radius: 30px; border: 1px solid var(--border); max-width: 550px; text-align: center; backdrop-filter: blur(40px); box-shadow: 0 50px 120px rgba(0,0,0,0.8);}

@keyframes spin{to{transform:rotate(360deg)}}
@media print { #left, .top-nav, #matrix-rain, #aiModal { display: none !important; } }
</style>
</head>
<body>

<div id="left">
  <div class="header-box">
    <div class="header-top">
        <div class="lh-ttl">대한변협 법규집 ✨</div>
        <div class="status-tag">
            <div class="dot" id="dbDot"></div>
            <span id="dbStatus">연결 확인 중</span>
        </div>
    </div>
    <div class="info-grid">

            <span class="info-lab">총 법규 수</span>
        </div>
        <div class="info-item">
            <span class="info-val">26.02.26</span>
            <span class="info-lab">최종 개정일</span>
        </div>
    </div>
  </div>

  <div class="tab-nav">
    <div class="tab on" id="tab0" onclick="switchTab(0)">규정 인덱스</div>
    <div class="tab" id="tab1" onclick="switchTab(1)">AI 본문 검색</div>
  </div>

  <div class="search-container">
    <div class="s-input-wrapper">
        <input class="s-input" id="searchQ" placeholder="검색어 또는 페이지 번호 입력..." autocomplete="off">
    </div>
  </div>

  <div class="cat-container" id="catZone">
    <div class="cat-grid" id="catBar"></div>
  </div>

  <div class="list-container" id="cardsWrap"></div>

  <div class="pager-box">

    <span id="listPgInfo" style="font-size:13px; color:var(--accent); font-family:monospace; font-weight:700;">1 / --</span>
    <button class="pager-btn" onclick="moveListPage(1)">다음 페이지</button>
  </div>
</div>

<div id="right">
  <canvas id="matrix-rain"></canvas>
  <div class="top-nav">

    <div style="display:flex; gap:15px; align-items:center;">
      <button class="ai-toggle-btn" onclick="toggleAI()">✨ AI 검색 엔진</button>
      <div style="width:1px; height:25px; background:var(--border);"></div>
      <div style="display:flex; gap:8px;">
        <button class="icon-btn" style="width:36px; height:36px; font-size:14px;" onclick="changePdfPage(-1)">◀</button>
        <div style="background:var(--bg-panel); padding:0 15px; border-radius:10px; display:flex; align-items:center; border:1px solid var(--border);">
            <span style="font-size:15px; color:var(--accent); font-family:monospace; font-weight:700;"><span id="curPg">1</span> / <span id="totPg">—</span></span>
        </div>
        <button class="icon-btn" style="width:36px; height:36px; font-size:14px;" onclick="changePdfPage(1)">▶</button>
      </div>
    </div>
  </div>
  <div id="cvwrap">
    <div id="loading">
      <div id="loadingUI">
        <div class="spin"></div>
        <div style="color:var(--accent); font-family:monospace; margin-top:20px; font-size:14px; letter-spacing:4px; font-weight:700;">ANALYZING REGS...</div>
      </div>
      <div id="recoveryUI" style="display:none;">
        <div class="glass-panel">
          <h3 style="color:var(--accent); margin-bottom:20px; font-size:22px;">데이터 보안 연동</h3>
          <p style="font-size:15px; color:var(--text-s); line-height:1.8; margin-bottom:30px;">
            브라우저 보안 제약으로 인해 파일을 자동으로 로드할 수 없습니다.<br>
            저장소의 <b>laws.pdf</b>와 <b>laws_data.json</b>을 아래 버튼으로 연결해 주세요.
          </p>
          <button class="ai-toggle-btn" style="width:100%; margin-bottom:12px;" onclick="document.getElementById('pdfIn').click()">📂 laws.pdf 연결하기</button>
          <input type="file" id="pdfIn" style="display:none" accept=".pdf" onchange="handleManualPdf(this)">
          <button class="pager-btn" style="width:100%; padding:14px;" onclick="document.getElementById('jsonIn').click()">📂 laws_data.json 연결하기</button>
          <input type="file" id="jsonIn" style="display:none" accept=".json" onchange="handleManualJson(this)">
        </div>
      </div>
    </div>
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<!-- AI Search Modal -->
<div id="aiModal">
  <div class="ai-header">
    <span style="font-weight:800; color:var(--accent); font-size:18px; letter-spacing:-0.5px;">✨ AI 법규 검색 엔진</span>
    <button class="pager-btn" style="border-radius:20px; padding:6px 15px;" onclick="toggleAI()">닫기</button>
  </div>
  <div class="ai-body" id="aiChat">
    <div class="ai-msg ai-msg-ai">반갑습니다. 본문 전체 데이터를 기반으로 가장 정확한 법적 근거를 찾아드립니다. 궁금한 키워드를 입력하세요.</div>
  </div>
  <div class="ai-input-box">
    <input type="text" class="s-input" id="aiInput" placeholder="예: 총회 성원 요건, 징계 절차 등">
    <button class="ai-toggle-btn" style="padding:14px 28px;" onclick="askAI()">검색</button>
  </div>
</div>

let globalJsonData = [];
let curTab = 0, activeCat = '전체', listPage = 0, searchTimeout = null;
const PER_PAGE = 12;

async function initApp() {
    const dbStatus = document.getElementById('dbStatus');
    const dbDot = document.getElementById('dbDot');
    const tbTitle = document.getElementById('tbTitle');
    const loadingUI = document.getElementById('loadingUI');
    const recoveryUI = document.getElementById('recoveryUI');

    try {
        const jsonRes = await fetch('laws_data.json?t=' + Date.now());
        if(jsonRes.ok) {
            globalJsonData = await jsonRes.json();
            dbStatus.innerText = "데이터 동기화 완료";
            dbDot.classList.add('ready');
        }
        const pdfTask = pdfjsLib.getDocument('laws.pdf');
        pdfDoc = await pdfTask.promise;
        document.getElementById('totPg').textContent = pdfDoc.numPages;
        loadingUI.style.display = 'none';
        document.getElementById('pdf-canvas').style.display = 'block';
        tbTitle.innerText = "2026 대한변호사협회 법규집";
        initCatBar(); renderPage(1); performSearch(); initInteractive();
    } catch (e) {
        loadingUI.style.display = 'none'; recoveryUI.style.display = 'block';
        initCatBar();
    }
}

/* ── INTERACTIVE (ZOOM & CLICK) ── */
function initInteractive() {
    const cvWrap = document.getElementById('cvwrap');
    const canvas = document.getElementById('pdf-canvas');
    cvWrap.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
            e.preventDefault();
            const step = 0.2;
            scale = (e.deltaY < 0) ? Math.min(scale + step, 4.0) : Math.max(scale - step, 0.4);
            renderPage(curPdfPg);
        }
    }, { passive: false });
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        changePdfPage(x < rect.width / 2 ? -1 : 1);
    });
}

/* ── REFINED TOKEN SEARCH ENGINE ── */
function performSearch() {
    const qRaw = document.getElementById('searchQ').value.trim().toLowerCase();
    const wrap = document.getElementById('cardsWrap');
    wrap.innerHTML = '';
    const tokens = qRaw.split(/\s+/).filter(t => t.length > 0);

    if(curTab === 0) {
        let filtered = ALL_REGS.filter(r => (activeCat === '전체' || r.cat === activeCat));
        if(tokens.length > 0) filtered = filtered.filter(r => tokens.every(t => r.n.toLowerCase().includes(t)));
        const totalPgs = Math.ceil(filtered.length / PER_PAGE);
        document.getElementById('listPgInfo').innerText = `${listPage + 1} / ${totalPgs || 1}`;
        filtered.slice(listPage * PER_PAGE, (listPage + 1) * PER_PAGE).forEach(r => {
            const d = document.createElement('div');
            d.className = 'reg-card' + (curPdfPg === r.p ? ' active' : '');
            d.innerHTML = `<div class="reg-pg-tag">INDEX P.${r.p}</div><div class="reg-name">${r.n}</div>`;
            d.onclick = () => { renderPage(r.p); document.getElementById('tbTitle').innerText = r.n; updateActive(d); };
            wrap.appendChild(d);
        });
    } else {
        if(globalJsonData.length === 0) { wrap.innerHTML = '<div style="color:var(--text-s); text-align:center; padding:50px;">데이터베이스를 연결하세요.</div>'; return; }
        if(tokens.length === 0) { wrap.innerHTML = '<div style="color:var(--text-s); text-align:center; padding:50px;">검색어를 입력하세요.</div>'; return; }
        const results = globalJsonData.filter(item => tokens.every(t => (item.content || "").toLowerCase().includes(t))).slice(0, 30);
        results.forEach(r => {
            const d = document.createElement('div');
            d.className = 'reg-card';
            let regName = "식별 조문";
            for(let i=0; i<ALL_REGS.length; i++) if(r.page >= ALL_REGS[i].p && (i+1 === ALL_REGS.length || r.page < ALL_REGS[i+1].p)) { regName = ALL_REGS[i].n; break; }
            d.innerHTML = `<div class="reg-pg-tag">PAGE ${r.page} | ${regName}</div><div class="reg-snip">${r.content.substring(0, 120)}...</div>`;
            d.onclick = () => { renderPage(r.page); }; wrap.appendChild(d);
        });
        if(results.length === 0) wrap.innerHTML = '<div style="color:var(--text-s); text-align:center; padding:50px;">일치하는 내용이 없습니다.</div>';
    }
}

/* ── AI SEARCH ENGINE (FREE LOCAL) ── */
async function askAI() {
    const input = document.getElementById('aiInput');
    const chat = document.getElementById('aiChat');
    const q = input.value.trim(); if(!q) return;
    input.value = '';
    chat.innerHTML += `<div class="ai-msg ai-msg-user">${q}</div>`;
    chat.scrollTop = chat.scrollHeight;

    if (globalJsonData.length === 0) { chat.innerHTML += `<div class="ai-msg ai-msg-ai">DB가 연결되지 않았습니다.</div>`; return; }
    chat.innerHTML += `<div class="ai-msg ai-msg-ai" id="aiTemp">🔍 AI가 1,128페이지의 조문을 정밀 분석 중입니다...</div>`;
    
    const tokens = q.split(/\s+/).filter(w => w.length > 1);
    let matchPool = [];
    globalJsonData.forEach(item => {
        const body = (item.content || "").toLowerCase();
        let score = 0; tokens.forEach(t => { if(body.includes(t.toLowerCase())) score += 10; }); 
        if(score > 0) {
            const idx = body.indexOf(tokens[0].toLowerCase());
            matchPool.push({pg: item.page, score: score, snip: body.substring(Math.max(0, idx - 20), idx + 220)});
        }
    });

    matchPool.sort((a,b) => b.score - a.score);
    const top = matchPool.slice(0, 3);
    
    setTimeout(() => {
        let res = "";
        if (top.length > 0) {
            res = `질문하신 내용과 관련하여 <b>${top.length}개의 주요 법적 근거</b>를 본문에서 추출했습니다.<br><br>`;
            top.forEach((m, i) => {
                let regName = "관련 조문";
                for(let j=0; j<ALL_REGS.length; j++) if(m.pg >= ALL_REGS[j].p && (j+1 === ALL_REGS.length || m.pg < ALL_REGS[j+1].p)) { regName = ALL_REGS[j].n; break; }
                res += `${i+1}. 📄 <b>${regName} (P.${m.pg})</b><br>`;
                res += `<small style="color:var(--text-s)">"...${m.snip.replace(/\n/g, ' ')}..."</small><br>`;
                res += `<button class="jump-btn" onclick="renderPage(${m.pg}); toggleAI();">📍 해당 조문으로 이동 (P.${m.pg})</button><br><br>`;
            });
        } else {
            res = "죄송합니다. 현재 법규집 본문에서 해당 키워드와 일치하는 명확한 근거를 찾지 못했습니다.";
        }
        document.getElementById('aiTemp').innerHTML = res;
        document.getElementById('aiTemp').id = '';
        chat.scrollTop = chat.scrollHeight;
    }, 800);
}

/* ── UI HELPERS ── */
function toggleSidebar() { document.getElementById('left').classList.toggle('collapsed'); setTimeout(() => window.dispatchEvent(new Event('resize')), 400); }
function toggleAI() { const m = document.getElementById('aiModal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
function switchTab(t) { curTab = t; listPage = 0; document.getElementById('tab0').classList.toggle('on', t===0); document.getElementById('tab1').classList.toggle('on', t===1); document.getElementById('catZone').style.display = t===0?'block':'none'; performSearch(); }
function updateActive(el){ document.querySelectorAll('.reg-card').forEach(c => c.classList.remove('active')); el.classList.add('active'); }
function changePdfPage(d){ if(pdfDoc) { let t = curPdfPg + d; if(t>=1 && t<=pdfDoc.numPages) renderPage(t); } }
function moveListPage(d) { listPage = Math.max(0, listPage + d); performSearch(); }
function initCatBar() {
    const bar = document.getElementById('catBar'); bar.innerHTML = '';
    CATS.forEach(c => {
        const chip = document.createElement('div'); chip.className = 'c-chip' + (c === '전체' ? ' active' : ''); chip.innerText = c;
        chip.onclick = () => { document.querySelectorAll('.c-chip').forEach(el => el.classList.remove('active')); chip.classList.add('active'); activeCat = c; listPage = 0; performSearch(); };
        bar.appendChild(chip);
    });
}
function handleManualPdf(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async (e) => { pdfDoc = await pdfjsLib.getDocument({ data: e.target.result }).promise; document.getElementById('totPg').textContent = pdfDoc.numPages; document.getElementById('recoveryUI').style.display = 'none'; document.getElementById('pdf-canvas').style.display = 'block'; renderPage(1); initInteractive(); }; reader.readAsArrayBuffer(file); }
function handleManualJson(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { globalJsonData = JSON.parse(e.target.result); document.getElementById('dbStatus').innerText = "DB 로드 완료"; document.getElementById('dbDot').classList.add('ready'); performSearch(); }; reader.readAsText(file); }

async function renderPage(pg){
    if(!pdfDoc || isRendering) return;
    isRendering = true; curPdfPg = pg;
    document.getElementById('curPg').textContent = pg;
    try {
        const page = await pdfDoc.getPage(pg);
        const vp = page.getViewport({ scale });
        const cv = document.getElementById('pdf-canvas');
        const ctx = cv.getContext('2d');
        cv.width = vp.width; cv.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
    } catch(e) {}
    isRendering = false;
}

function initMatrix() {
    const canvas = document.getElementById('matrix-rain');
    const ctx = canvas.getContext('2d');
    const CHARS = '0123456789대한변협법규집분석시스템';
    const FONT_SIZE = 15;
    let cols, drops;
    function resize() { canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight; cols = Math.floor(canvas.width / FONT_SIZE); drops = Array.from({length: cols}, () => Math.random() * -100); }
    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = FONT_SIZE + 'px monospace';
        for(let i = 0; i < drops.length; i++) {
            const text = CHARS[Math.floor(Math.random() * CHARS.length)];
            ctx.shadowBlur = 10; ctx.shadowColor = '#10b981'; ctx.fillStyle = '#10b981';
            ctx.fillText(text, i * FONT_SIZE, drops[i] * FONT_SIZE);
            if(drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.985) drops[i] = 0;
            drops[i]++;
        }
        requestAnimationFrame(draw);
    }
    resize(); window.addEventListener('resize', resize); requestAnimationFrame(draw);
}

window.onload = () => { initApp(); initMatrix(); };
document.getElementById('searchQ').oninput = () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(performSearch, 250); };
document.getElementById('aiInput').onkeydown = e => { if(e.key === 'Enter') askAI(); };
</script>
