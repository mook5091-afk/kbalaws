<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 대한변호사협회 법규집 ✨ NOTEBOOK-LM CONNECT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   INFOGRAPHIC DASHBOARD THEME (DEEP NAVY)
══════════════════════════════════════════════ */
:root{
  --sidebar-w: 460px;
  --bg-main: #020617; --bg-panel: #0f172a; --bg-card: #1e293b;
  --accent: #38bdf8; --text-p: #f8fafc; --text-s: #94a3b8; --text-m: #475569; 
  --gold: #fbbf24; --green: #10b981; --purple: #818cf8; 
  --border: rgba(255, 255, 255, 0.1);
}

*{box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing: antialiased;}
body{height:100vh; overflow:hidden; font-family:'Noto Sans KR',sans-serif; background:var(--bg-main); color:var(--text-p); display:flex;}

/* ── LEFT SIDEBAR ── */
#left{
  width: var(--sidebar-w); min-width: var(--sidebar-w); height:100%;
  background: var(--bg-main); display:flex; flex-direction:column;
  border-right: 1px solid var(--border); z-index:100;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
#left.collapsed { transform: translateX(calc(var(--sidebar-w) * -1)); margin-right: calc(var(--sidebar-w) * -1); }

.header-box{padding:30px 24px 20px; background: linear-gradient(180deg, var(--bg-panel) 0%, var(--bg-main) 100%);}
.header-top{display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;}
.header-ttl{font-family:'Noto Serif KR',serif; font-size:24px; font-weight:700; letter-spacing:-1px;}

.info-grid{display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;}
.info-item{background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px; border-radius: 12px; text-align: center;}
.info-val{display: block; font-size: 18px; font-weight: 700; color: var(--accent); font-family: monospace;}
.info-lab{display: block; font-size: 10px; color: var(--text-s); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px;}

.system-link-btn{
    width: 100%; padding: 14px; background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); 
    border-radius: 12px; color: var(--gold); font-size: 13px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
}
.system-link-btn:hover{ background: var(--gold); color: var(--bg-main); transform: translateY(-2px);}

.tab-nav{display:flex; padding:0 20px; border-bottom:1px solid var(--border);}
.tab{padding:15px 15px; font-size:14px; color:var(--text-s); cursor:pointer; position:relative; font-weight: 500;}
.tab.on{color:var(--accent); font-weight:700;}
.tab.on::after{content:''; position:absolute; bottom:-1px; left:0; width:100%; height:3px; background:var(--accent); border-radius:3px 3px 0 0;}

.search-container{padding:20px;}
.s-input{width:100%; padding:14px 18px; background:var(--bg-panel); border:1px solid var(--border); border-radius:12px; color:var(--text-p); font-size:14.5px; outline:none; transition:0.3s;}
.s-input:focus{border-color:var(--accent); box-shadow: 0 0 0 4px rgba(56,189,248,0.15);}

.cat-grid{display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 0 20px 15px;}
.c-chip{padding: 8px 2px; border-radius: 8px; background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-s); font-size: 10px; text-align: center; cursor: pointer; transition: 0.2s; overflow: hidden; white-space: nowrap;}
.c-chip.active{ background: var(--accent); color: var(--bg-main); font-weight: 700; border-color: var(--accent); }

.list-container{flex:1; overflow-y:auto; padding:15px; scroll-behavior: smooth;}
.reg-card{padding:20px; background:var(--bg-panel); border: 1px solid var(--border); border-radius:16px; cursor:pointer; margin-bottom:15px; transition:0.3s;}
.reg-card:hover{border-color:var(--accent); transform:translateY(-4px); background:rgba(255,255,255,0.02);}
.reg-card.active{border-color:var(--accent); background:rgba(56,189,248,0.06);}
.reg-pg-tag{font-size:10px; color:var(--accent); font-weight: 800; margin-bottom:10px; background: rgba(56,189,248,0.1); width: fit-content; padding: 3px 8px; border-radius: 6px;}
.reg-name{font-size:15.5px; line-height:1.6; font-weight:600;}
.reg-snip{font-size:13px; color:var(--text-s); margin-top:12px; line-height:1.7; border-top: 1px solid var(--border); padding-top:12px;}

.pager-box{padding:18px 24px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--bg-panel);}
.pager-btn{background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-p); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s;}

/* ── RIGHT VIEW ── */
#right{flex:1; display:flex; flex-direction:column; position:relative; background:#000; overflow:hidden;}
.top-nav{display:flex; align-items:center; gap:15px; padding:0 30px; height:70px; background:rgba(2,6,23,0.8); backdrop-filter:blur(30px); border-bottom:1px solid var(--border); z-index:20;}
.viewer-title{flex:1; font-size:16px; font-weight:600; font-family:'Noto Serif KR',serif;}

.icon-btn{width:44px; height:44px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius:12px; color:var(--accent); cursor:pointer; transition:0.3s;}
.icon-btn:hover{background:var(--accent); color:var(--bg-main);}

.ai-toggle-btn{background: linear-gradient(135deg, var(--gold), #b45309); border:none; color:white; padding: 12px 24px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 20px rgba(251,191,36,0.3); transition: 0.3s;}

#cvwrap{flex:1; overflow:auto; display:flex; justify-content:center; align-items: flex-start; padding:50px; position:relative; z-index:10; cursor: zoom-in;}
#pdf-canvas{box-shadow: 0 50px 150px rgba(0,0,0,1); background:#fff; display:none; border-radius:4px;}

/* AI & NotebookLM Modal */
#aiModal{position:fixed; bottom:30px; right:30px; width:500px; height:700px; background:var(--bg-panel); border:1px solid var(--border); border-radius:28px; z-index:2000; display:none; flex-direction:column; box-shadow:0 30px 100px rgba(0,0,0,0.9); overflow:hidden; backdrop-filter: blur(20px);}
.ai-header{padding:25px 30px; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}
.ai-body{flex:1; overflow-y:auto; padding:30px; scroll-behavior: smooth;}
.ai-msg{padding:20px; border-radius:20px; margin-bottom:24px; font-size:14.5px; line-height:1.8; box-shadow: 0 4px 15px rgba(0,0,0,0.2);}
.ai-msg-ai{background:rgba(251,191,36,0.05); border-left:6px solid var(--gold); color:var(--text-p);}
.ai-msg-user{background:var(--bg-card); margin-left:auto; text-align:right; color:var(--accent); max-width:85%;}

.action-row{display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px;}
.jump-btn{display:inline-flex; align-items:center; gap:8px; padding:10px 16px; background:var(--accent); color:var(--bg-main); border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; border:none;}
.notebook-btn{display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:var(--gold); color:var(--bg-main); border-radius:12px; font-size:13px; font-weight:800; cursor:pointer; border:none; width:100%; justify-content:center;}

.ai-input-box{padding:25px; background:var(--bg-main); border-top:1px solid var(--border); display:flex; gap:12px; align-items:center;}

#loading{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:500; text-align:center; width: 100%;}
.spin{width:60px; height:60px; border:6px solid rgba(56,189,248,0.1); border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin: 0 auto;}

@keyframes spin{to{transform:rotate(360deg)}}
@media print { #left, .top-nav, #aiModal { display: none !important; } }
</style>
</head>

</div>

async function initApp() {
    try {
        const jsonRes = await fetch('laws_data.json?t=' + Date.now());

            globalJsonData = await jsonRes.json();
            normalizedData = globalJsonData.map(item => ({ p: item.page, c: (item.content || "").toLowerCase() }));

        document.getElementById('loadingUI').style.display = 'none';
        document.getElementById('recoveryUI').style.display = 'block';

    }
}

/* ── INTERACTIVE (ZOOM & CLICK) ── */
function initInteractive() {
    const cvWrap = document.getElementById('cvwrap');
    const canvas = document.getElementById('pdf-canvas');
    cvWrap.addEventListener('wheel', (e) => {
        if (e.ctrlKey) {
            e.preventDefault();
            scale = (e.deltaY < 0) ? Math.min(scale + 0.2, 4.0) : Math.max(scale - 0.2, 0.4);
            renderPage(curPdfPg);
        }
    }, { passive: false });
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        changePdfPage((e.clientX - rect.left) < rect.width / 2 ? -1 : 1);
    });
}

/* ── SEARCH & NOTEBOOK LM DATA BRIDGE ── */
function performSearch() {
    const qRaw = document.getElementById('searchQ').value.trim().toLowerCase();
    const wrap = document.getElementById('cardsWrap'); wrap.innerHTML = '';
    const tokens = qRaw.split(/\s+/).filter(t => t.length > 0);

    if(curTab === 0) {
        let filtered = ALL_REGS.filter(r => (activeCat === '전체' || r.cat === activeCat));
        if(tokens.length) filtered = filtered.filter(r => tokens.every(t => r.n.toLowerCase().includes(t)));
        document.getElementById('listPgInfo').innerText = `${listPage+1} / ${Math.ceil(filtered.length/PER_PAGE) || 1}`;
        filtered.slice(listPage*PER_PAGE, (listPage+1)*PER_PAGE).forEach(r => {
            const d = document.createElement('div'); d.className = 'reg-card' + (curPdfPg === r.p ? ' active' : '');
            d.innerHTML = `<div class="reg-pg-tag">INDEX P.${r.p}</div><div class="reg-name">${r.n}</div>`;
            d.onclick = () => { renderPage(r.p); document.getElementById('tbTitle').innerText = r.n; updateActive(d); };
            wrap.appendChild(d);
        });
    } else {
        if(!normalizedData.length || !tokens.length) return;
        normalizedData.filter(item => tokens.every(t => item.c.includes(t))).slice(0, 30).forEach(r => {
            const d = document.createElement('div'); d.className = 'reg-card';
            const original = globalJsonData.find(o => o.page === r.p).content || "";
            d.innerHTML = `<div class="reg-pg-tag">PAGE ${r.p}</div><div class="reg-name">${original.substring(0, 80)}...</div>`;
            d.onclick = () => { renderPage(r.p); }; wrap.appendChild(d);
        });
    }
}

async function askAI() {
    const chat = document.getElementById('aiChat');
    const q = document.getElementById('aiInput').value.trim(); if(!q) return;
    document.getElementById('aiInput').value = '';
    chat.innerHTML += `<div class="ai-msg ai-msg-user">${q}</div>`;
    chat.innerHTML += `<div class="ai-msg ai-msg-ai" id="aiTemp">🔍 관련 조문을 스캔하여 노트북LM 전송 데이터를 생성 중...</div>`;
    chat.scrollTop = chat.scrollHeight;

    setTimeout(() => {
        const tokens = q.split(/\s+/).filter(w => w.length > 1);
        let matchPool = [];
        normalizedData.forEach(item => {
            let score = 0; tokens.forEach(t => { if(item.c.includes(t)) score += 10; });
            if(score > 0) matchPool.push({ p: item.p, score, txt: globalJsonData.find(o => o.page === item.p).content });
        });
        matchPool.sort((a,b) => b.score - a.score);
        const top = matchPool.slice(0, 5);

        if(top.length) {
            let fullDataText = `--- 법규집 분석 요청 (질문: ${q}) ---\n\n`;
            let resHtml = `노트북LM이 질문에 답변할 수 있도록 <b>${top.length}개의 주요 법적 근거</b>를 준비했습니다.<br><br>`;
            top.forEach((m, i) => {
                resHtml += `📄 <b>조문 근거 ${i+1} (P.${m.p})</b><br><div class="action-row"><button class="jump-btn" onclick="renderPage(${m.p}); toggleAI();">📍 이동</button></div><br>`;
                fullDataText += `[근거 P.${m.p}]: ${m.txt}\n\n`;
            });
            resHtml += `<button class="notebook-btn" onclick="copyAndJumpToNotebook('${encodeURIComponent(fullDataText.replace(/'/g, "\\'"))}')">🚀 노트북LM에서 질문하고 답변받기</button>`;
            document.getElementById('aiTemp').innerHTML = resHtml;
        } else {
            document.getElementById('aiTemp').innerHTML = "관련 근거를 찾지 못했습니다. 다른 검색어로 시도하세요.";
        }
        document.getElementById('aiTemp').id = '';
        chat.scrollTop = chat.scrollHeight;
    }, 400);
}

function copyAndJumpToNotebook(context) {
    const text = decodeURIComponent(context);
    const el = document.createElement('textarea'); el.value = text; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    
    const msg = document.createElement('div');
    msg.innerText = "✅ 조문 복사 완료! '법규집 - NotebookLM'으로 이동합니다. [텍스트 복사] 소스에 붙여넣으세요.";
    msg.style = "position:fixed; top:30px; left:50%; transform:translateX(-50%); background:var(--gold); color:var(--bg-main); padding:20px 40px; border-radius:15px; z-index:9999; font-weight:800; box-shadow:0 10px 40px rgba(0,0,0,0.6);";
    document.body.appendChild(msg);
    
    setTimeout(() => { window.open(TARGET_NOTEBOOK_URL, '_blank'); msg.remove(); }, 2000);
}

/* ── UI HELPERS ── */
function toggleSidebar() { document.getElementById('left').classList.toggle('collapsed'); }
function toggleAI() { const m = document.getElementById('aiModal'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
function switchTab(t) { curTab = t; listPage = 0; document.getElementById('tab0').classList.toggle('on', t===0); document.getElementById('tab1').classList.toggle('on', t===1); performSearch(); }
function updateActive(el){ document.querySelectorAll('.reg-card').forEach(c => c.classList.remove('active')); el.classList.add('active'); }
function changePdfPage(d){ if(pdfDoc) { let t = curPdfPg + d; if(t>=1 && t<=pdfDoc.numPages) renderPage(t); } }
function moveListPage(d) { listPage = Math.max(0, listPage + d); performSearch(); }
function initCatBar() {
    const bar = document.getElementById('catBar'); bar.innerHTML = '';
    CATS.forEach(c => {
        const chip = document.createElement('div'); chip.className = 'c-chip' + (c === '전체' ? ' active' : ''); chip.innerText = c;
        chip.onclick = () => { document.querySelectorAll('.c-chip').forEach(el => el.classList.remove('active')); chip.classList.add('active'); activeCat = c; listPage = 0; performSearch(); };
        bar.appendChild(chip);
    });
}
async function renderPage(pg){
    if(!pdfDoc || isRendering) return; isRendering = true; curPdfPg = pg;
    document.getElementById('curPg').textContent = pg;
    const page = await pdfDoc.getPage(pg); const vp = page.getViewport({ scale });
    const cv = document.getElementById('pdf-canvas'); const ctx = cv.getContext('2d');
    cv.width = vp.width; cv.height = vp.height; await page.render({ canvasContext: ctx, viewport: vp }).promise;
    isRendering = false;
}
function handleManualPdf(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async (e) => { pdfDoc = await pdfjsLib.getDocument({ data: e.target.result }).promise; document.getElementById('totPg').textContent = pdfDoc.numPages; document.getElementById('recoveryUI').style.display = 'none'; document.getElementById('pdf-canvas').style.display = 'block'; renderPage(1); }; reader.readAsArrayBuffer(file); }
function handleManualJson(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (e) => { globalJsonData = JSON.parse(e.target.result); normalizedData = globalJsonData.map(item => ({ p: item.page, c: (item.content || "").toLowerCase() })); performSearch(); }; reader.readAsText(file); }

window.onload = initApp;
document.getElementById('searchQ').oninput = () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(performSearch, 250); };
document.getElementById('aiInput').onkeydown = e => { if(e.key === 'Enter') askAI(); };
</script>
