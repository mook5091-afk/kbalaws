<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 대한변호사협회 법규집</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   THEME & LAYOUT - NAVY & MATRIX PREMIUM
══════════════════════════════════════════════ */
:root{
  --lbg:  #161b2e; --lbg2: #1e2540; --lbg3: #252d4e; --lbg4: #2e3a62;
  --lb:   #3a4a7a; --la:   #7eaaff; --la2:  #aac8ff;
  --lt1:  #f0f4ff; --lt2:  #c0ceed; --lt3:  #7a90bb; --lgold:#ffd166;
  --mg:   #00ff41; --mg2:  #00c832; --mg3:  #007a1e; --mg4:  #003d0f;
  --mglow: 0 0 10px rgba(0,255,65,.5);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:#000}
#app{display:flex;height:100vh}

/* ── LEFT PANEL ── */
#left{
  width:480px;min-width:480px;height:100vh;
  background:var(--lbg); display:flex; flex-direction:column;
  border-right:1px solid var(--lb); box-shadow:2px 0 20px rgba(0,0,0,.5);
  position:relative; z-index:5; flex-shrink:0;
}
.lh{padding:20px 20px 16px; background:var(--lbg2); border-bottom:1px solid var(--lb);}
.lh-kba{font-size:11px;color:var(--la);letter-spacing:2.5px;font-weight:700;margin-bottom:7px;text-transform:uppercase;}
.lh-ttl{font-family:'Noto Serif KR',serif; font-size:19px;font-weight:700; color:var(--lt1);line-height:1.3;}
.lh-sub{font-size:12px;color:var(--lt3);margin-top:5px}

.stab-row{display:flex;background:var(--lbg2); border-bottom:1px solid var(--lb);}
.stab{flex:1;padding:12px 0;text-align:center; font-size:13px;color:var(--lt3);cursor:pointer; border-bottom:2px solid transparent;transition:all .18s;}
.stab.on{color:var(--la);border-bottom-color:var(--la);font-weight:600}

.sbox{padding:12px 14px 11px; background:var(--lbg2); border-bottom:1px solid var(--lb);}
.sinput{width:100%;padding:10px 13px; background:rgba(255,255,255,.07); border:1px solid var(--lb);border-radius:7px; color:var(--lt1);font-size:14px; outline:none;caret-color:var(--la); font-family: inherit;}
.sinfo{font-size:11px;color:var(--lt3);margin-top:8px;min-height:16px; letter-spacing:-0.2px;}

.cards-wrap{flex:1;overflow-y:auto;padding:11px;background:var(--lbg)}
.card{display:flex;flex-direction:column; padding:13px 12px; background:var(--lbg2); border:1px solid var(--lb); border-radius:9px;cursor:pointer; transition:all .16s; margin-bottom:8px; position:relative; overflow:hidden;}
.card:hover{background:var(--lbg3);border-color:var(--la);transform:translateY(-2px);}
.card.active{background:var(--lbg4);border-color:var(--la);box-shadow:0 0 0 2px rgba(126,170,255,.25);}
.card-pg{font-size:11px;font-weight:700;color:var(--la); margin-bottom:6px; font-family: monospace;}
.card-name{font-size:13px;color:var(--lt1);line-height:1.45;word-break:keep-all;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}

/* ── RIGHT PANEL & MATRIX ── */
#right{flex:1;display:flex;flex-direction:column; overflow:hidden;position:relative; background:#000;}
#matrix-rain{position:absolute;inset:0; width:100%;height:100%; z-index:0;pointer-events:none;}

.toolbar{display:flex;align-items:center;gap:10px; padding:0 14px;height:48px; background:var(--lbg2); border-bottom:1px solid var(--lb); position:relative;z-index:20; flex-shrink:0;}
.tb-title{flex:1;font-family:'Noto Serif KR',serif; font-size:13px;color:var(--lt1);font-weight:600; overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbtn{padding:5px 12px;border:1px solid var(--lb);border-radius:3px; background:transparent;color:var(--lt2);font-size:11px;cursor:pointer; transition:all .12s; font-family: inherit;}
.tbtn:hover:not(:disabled){background:rgba(126,170,255,.1);color:var(--la);border-color:var(--la);}
.tbtn-action{background: rgba(126,170,255,.08); border-color: var(--la); color: var(--la2); font-weight: 500;}

.pg-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--lt3); font-family: monospace;}
.pg-num{width:46px;padding:4px 6px;border:1px solid var(--lb);border-radius:3px; text-align:center;font-size:11px; outline:none; background:rgba(255,255,255,.05);color:var(--lt1); font-family: monospace;}

#cvwrap{flex:1;overflow:auto; display:flex;justify-content:center;align-items:flex-start; padding:24px 60px; position:relative;z-index:10; background:transparent; touch-action: pan-y;}
#pdf-canvas{box-shadow:0 12px 60px rgba(0,0,0,0.9); background:#fff;display:none; flex-shrink:0;}

#loading{position:absolute;top:50%;left:50%; transform:translate(-50%,-50%);text-align:center;z-index:10;}
.spin{width:40px;height:40px; border:3px solid var(--mg4);border-top-color:var(--mg); border-radius:50%;animation:spin .8s linear infinite; margin:0 auto 14px; box-shadow: var(--mglow);}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-txt{font-size:13px;color:var(--mg);text-shadow:var(--mglow); font-family: monospace; letter-spacing: 1px;}

@media print {
  #left, .toolbar, #matrix-rain, #loading { display: none !important; }
  #app, #right, #cvwrap { display: block !important; width: 100% !important; height: auto !important; padding: 0 !important; margin: 0 !important; }
  #pdf-canvas { display: block !important; width: 100% !important; box-shadow: none !important; border: none !important; }
}
</style>
</head>

<div id="app">
  <div id="left">
    <div class="lh">
      <div class="lh-kba">KOREAN BAR ASSOCIATION</div>
      <div class="lh-ttl">대한변호사협회 법규집</div>
      <div class="lh-sub">2026. 2. 26. 현재 · 총 1,128면 · 규정 <b style="color:var(--la)">182개</b></div>
    </div>
    <div class="stab-row">
      <div class="stab on" id="stab0" onclick="switchTab(0)">📋 목록 검색</div>
      <div class="stab" id="stab1" onclick="switchTab(1)">🔍 본문 검색</div>
    </div>
    <div class="sbox">
      <input class="sinput" id="searchQ" placeholder="규정 명칭을 입력하세요..." autocomplete="off">
      <div class="sinfo" id="sinfo">총 182개의 규정이 로드되었습니다.</div>

    <div class="cards-wrap" id="cardsWrap"></div>

        <button class="tbtn" id="listPrev" onclick="moveListPage(-1)">◀</button>

        <button class="tbtn" id="listNext" onclick="moveListPage(1)">▶</button>
    </div>
  </div>

  <div id="right">
    <canvas id="matrix-rain"></canvas>
    <div class="toolbar">
      <div class="tb-title" id="tbTitle">대한변호사협회 법규집 2026</div>
      <div class="tb-r">
        <button class="tbtn tbtn-action" onclick="window.print()">🖨️ 인쇄</button>
        <button class="tbtn tbtn-action" id="btnDownloadReg" onclick="downloadCurrentRegulation()">⬇️ 조문 추출</button>
        <div style="width: 1px; height: 16px; background: var(--lb); margin: 0 4px;"></div>
        <button class="tbtn" id="btnPrev" onclick="changePdfPage(-1)">◀</button>
        <div class="pg-wrap"><input type="number" class="pg-num" id="pgNum" value="1"> / <span id="pgTot">—</span></div>
        <button class="tbtn" id="btnNext" onclick="changePdfPage(1)">▶</button>
      </div>
    </div>
    <div id="cvwrap">
      <div id="loading"><div class="spin"></div><div class="ld-txt">LOADING PDF...</div></div>
      <canvas id="pdf-canvas"></canvas>
    </div>
  </div>
</div>

/* PDF ENGINE CONFIG */
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let pdfDoc = null, curPdfPg = 1, pdfTotal = 0, scale = 0.95, isRendering = false, pendingPg = null;
let listPage = 0; const PER_PAGE = 10;
let filteredList = [...ALL_REGS];

async function loadPDF(url){
  try{
    const loadingEl = document.getElementById('loading');
    loadingEl.style.display = 'block';
    const doc = await pdfjsLib.getDocument(url).promise;
    pdfDoc = doc; pdfTotal = doc.numPages;
    document.getElementById('pgTot').textContent = pdfTotal;
    loadingEl.style.display = 'none';
    document.getElementById('pdf-canvas').style.display = 'block';
    renderPage(1);
  } catch(e){
    document.getElementById('loading').innerHTML = '<b style="color:#f44">PDF를 불러올 수 없습니다. laws.pdf 파일이 있는지 확인하세요.</b>';
  }
}

async function renderPage(pg){
  if(!pdfDoc || isRendering) { pendingPg = pg; return; }
  isRendering = true; curPdfPg = pg;
  document.getElementById('pgNum').value = pg;
  document.getElementById('btnPrev').disabled = pg <= 1;
  document.getElementById('btnNext').disabled = pg >= pdfTotal;

  const page = await pdfDoc.getPage(pg);
  const vp = page.getViewport({ scale });
  const cv = document.getElementById('pdf-canvas');
  const ctx = cv.getContext('2d');
  cv.width = vp.width; cv.height = vp.height;
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  
  isRendering = false;
  if(pendingPg) { 
    const next = pendingPg; pendingPg = null; renderPage(next); 
  }
}

function changePdfPage(d){ 
  let target = curPdfPg + d;
  if(target >= 1 && target <= pdfTotal) renderPage(target);
}

/* UI LOGIC */
function switchTab(t){
  document.getElementById('stab0').classList.toggle('on', t===0);
  document.getElementById('stab1').classList.toggle('on', t===1);
}

function renderTOCTab(){
  const wrap = document.getElementById('cardsWrap');
  wrap.innerHTML = '';
  const start = listPage * PER_PAGE;
  const slice = filteredList.slice(start, start + PER_PAGE);
  
  if(slice.length === 0) {
    wrap.innerHTML = '<div style="color:var(--lt3); text-align:center; padding-top:40px;">검색 결과가 없습니다.</div>';
  } else {
    slice.forEach(r => {
      const d = document.createElement('div');
      d.className = 'card' + (curPdfPg === r.p ? ' active' : '');
      d.innerHTML = `<div class="card-pg">PAGE ${r.p}</div><div class="card-name">${r.n}</div>`;
      d.onclick = () => { renderPage(r.p); document.getElementById('tbTitle').innerText = r.n; updateActiveCard(d); };
      wrap.appendChild(d);
    });
  }
  document.getElementById('listPgInfo').innerText = `${listPage + 1} / ${Math.max(1, Math.ceil(filteredList.length/PER_PAGE))}`;
}

function updateActiveCard(el){
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
}

function moveListPage(d){
  const max = Math.ceil(filteredList.length / PER_PAGE);
  listPage = Math.max(0, Math.min(max - 1, listPage + d));
  renderTOCTab();
}

document.getElementById('searchQ').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filteredList = ALL_REGS.filter(r => r.n.toLowerCase().includes(q));
    listPage = 0;
    renderTOCTab();
});

async function downloadCurrentRegulation() {
  if (!pdfDoc) return;
  let reg = null, end = pdfTotal;
  for (let i = 0; i < ALL_REGS.length; i++) {
    if (curPdfPg >= ALL_REGS[i].p) {
      reg = ALL_REGS[i];
      end = (i + 1 < ALL_REGS.length) ? ALL_REGS[i + 1].p - 1 : pdfTotal;
    } else break;
  }
  if (!reg) return;
  const btn = document.getElementById('btnDownloadReg');
  const originText = btn.innerText;
  btn.innerText = '⏳ 추출 중...';
  try {
    const res = await fetch('laws.pdf');
    const buf = await res.arrayBuffer();
    const { PDFDocument } = PDFLib;
    const srcDoc = await PDFDocument.load(buf);
    const newDoc = await PDFDocument.create();
    const range = Array.from({length: end - reg.p + 1}, (_, i) => reg.p - 1 + i);
    const copiedPages = await newDoc.copyPages(srcDoc, range);
    copiedPages.forEach(p => newDoc.addPage(p));
    const bytes = await newDoc.save();
    const blob = new Blob([bytes], {type:'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${reg.n}.pdf`; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch (e) { alert('다운로드 중 오류가 발생했습니다.'); }
  btn.innerText = originText;
}

  const FONT_SIZE = 14;
  let cols, drops;

  function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
    cols = Math.floor(canvas.width / FONT_SIZE);
    drops = Array.from({length: cols}, () => Math.random() * -100);
  }
  
  function draw() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.045)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.font = FONT_SIZE + 'px monospace';

    for(let i = 0; i < drops.length; i++) {
      const text = CHARS[Math.floor(Math.random() * CHARS.length)];
      const x = i * FONT_SIZE;
      const y = drops[i] * FONT_SIZE;
      
      // Head char (Bright White-Green with Glow)
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#00ff41';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(text, x, y);
      
      // Tail char (Matrix Green)
      ctx.shadowBlur = 2;
      ctx.fillStyle = '#00ff41';
      ctx.fillText(text, x, y - FONT_SIZE);

      if(y > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    ctx.shadowBlur = 0; // Reset for next frame
  }
  resize();
  window.addEventListener('resize', resize);
  setInterval(draw, 50);
}

window.onload = () => {
  loadPDF('laws.pdf');
  renderTOCTab();
  initMatrix();
};

/* MOUSE SWIPE */
const cvWrap = document.getElementById('cvwrap');
let startX = 0;
cvWrap.onpointerdown = e => { startX = e.clientX; };
cvWrap.onpointerup = e => {
  const diff = e.clientX - startX;
  if(Math.abs(diff) > 80) changePdfPage(diff > 0 ? -1 : 1);
};
</script>
