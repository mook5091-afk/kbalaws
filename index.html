<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 대한변호사협회 법규집 ✨ AI ENGINE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   PREMIUM NAVY & MATRIX THEME
══════════════════════════════════════════════ */
:root{
  --sidebar-w: 480px;
  --lbg: #0f172a; --lbg2: #1e293b; --lb: #334155; --la: #38bdf8;
  --lt1: #f8fafc; --lt2: #cbd5e1; --lt3: #94a3b8; --lgold: #fbbf24;
  --mg: #00ff41; --ai-purp: #a78bfa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh; overflow:hidden; font-family:'Noto Sans KR',sans-serif; background:#000; color:var(--lt1); display:flex;}

/* ── LEFT SIDEBAR ── */
#left{
  width: var(--sidebar-w); min-width: var(--sidebar-w); height:100%;
  background: var(--lbg); display:flex; flex-direction:column;
  border-right:1px solid rgba(255,255,255,0.1); z-index:100;
  transition: transform 0.3s ease;
}
#left.collapsed { transform: translateX(calc(var(--sidebar-w) * -1)); margin-right: calc(var(--sidebar-w) * -1); }

.lh{padding:24px; background: linear-gradient(180deg, var(--lbg2), var(--lbg)); border-bottom:1px solid var(--lb);}
.lh-ttl{font-family:'Noto Serif KR',serif; font-size:20px;font-weight:700; color:var(--lt1);}

.stab-row{display:flex; border-bottom:1px solid var(--lb);}
.stab{flex:1; padding:15px 0; text-align:center; font-size:13px; color:var(--lt3); cursor:pointer; transition:0.2s;}
.stab.on{color:var(--la); font-weight:700; border-bottom:2px solid var(--la);}

.sbox{padding:15px 20px; border-bottom:1px solid var(--lb);}
.sinput{width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--lb); border-radius:8px; color:var(--lt1); outline:none;}
.sinfo{font-size:11px; color:var(--lt3); margin-top:8px; display:flex; justify-content:space-between; font-family:monospace;}

.cat-scroll{padding:10px; display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; border-bottom:1px solid var(--lb);}
.c-chip{padding:5px 12px; border-radius:15px; background:var(--lbg2); border:1px solid var(--lb); color:var(--lt3); font-size:11px; cursor:pointer; white-space:nowrap;}
.c-chip.active{background:var(--la); color:var(--lbg); font-weight:700;}

.cards-wrap{flex:1; overflow-y:auto; padding:15px;}
.card{padding:16px; background:var(--lbg2); border:1px solid rgba(255,255,255,0.05); border-radius:10px; cursor:pointer; margin-bottom:12px; transition:0.2s;}
.card:hover{border-color:var(--la); transform:translateY(-2px);}
.card.active{border-color:var(--la); background:rgba(56,189,248,0.1);}
.card-pg{font-size:10px; color:var(--la); font-weight:700; margin-bottom:5px;}
.card-name{font-size:14px; line-height:1.4;}

/* ── RIGHT VIEW ── */
#right{flex:1; display:flex; flex-direction:column; position:relative; background:#000;}
#matrix-rain{position:absolute; inset:0; z-index:0; pointer-events:none;}

.toolbar{display:flex; align-items:center; gap:12px; padding:0 20px; height:56px; background:rgba(15,23,42,0.8); backdrop-filter:blur(10px); border-bottom:1px solid var(--lb); z-index:20;}
.tb-title{flex:1; font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

.toggle-btn{width:36px; height:36px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); border:1px solid var(--lb); border-radius:6px; color:var(--la); cursor:pointer;}

.tbtn{padding:8px 15px; border:1px solid var(--lb); border-radius:6px; background:transparent; color:var(--lt2); font-size:12px; cursor:pointer;}
.tbtn:hover{background:var(--la); color:var(--lbg);}
.tbtn-ai{background:rgba(167,139,250,0.15); border-color:var(--ai-purp); color:var(--ai-purp); font-weight:700;}

#cvwrap{flex:1; overflow:auto; display:flex; justify-content:center; align-items: flex-start; padding:40px; position:relative; z-index:10;}
#pdf-canvas{box-shadow: 0 20px 80px rgba(0,0,0,0.8); background:#fff; display:none;}

/* AI & System UI */
#aiModal{position:fixed; bottom:25px; right:25px; width:450px; height:600px; background:var(--lbg); border:1px solid var(--lb); border-radius:15px; z-index:2000; display:none; flex-direction:column; box-shadow:0 20px 50px rgba(0,0,0,0.5);}
.ai-bubble{padding:12px 16px; border-radius:12px; margin-bottom:12px; font-size:13.5px; line-height:1.6; max-width:85%;}
.ai-bubble-ai{background:rgba(167,139,250,0.1); border-left:4px solid var(--ai-purp);}
.ai-bubble-user{background:var(--lbg2); margin-left:auto; text-align:right; color:var(--la2);}

#loading{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:500; text-align:center; width: 100%;}
.spin{width:40px; height:40px; border:3px solid rgba(56,189,248,0.2); border-top-color:var(--la); border-radius:50%; animation:spin 1s linear infinite; margin: 0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Recovery Box */
.recovery-box { background: rgba(30,41,59,0.9); border: 2px solid var(--la); padding: 25px; border-radius: 15px; text-align: center; max-width: 440px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
.recovery-btn { background: var(--la); color: var(--lbg); border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.2s; }
.recovery-btn:hover { background: var(--la2); transform: scale(1.05); }

@media print { #left, .toolbar, #matrix-rain, #aiModal { display: none !important; } }
</style>
</head>
<body>

<div id="left">
  <div class="lh">
    <div style="font-size:9px; color:var(--la); letter-spacing:2px; margin-bottom:5px;">KBA DIGITAL ARCHIVE</div>
    <div class="lh-ttl">대한변협 법규지능 ✨</div>
  </div>
  <div class="stab-row">
    <div class="stab on" id="stab0" onclick="switchTab(0)">📋 규정</div>
    <div class="stab" id="stab1" onclick="switchTab(1)">🔍 초고속 본문 검색</div>
  </div>
  <div class="sbox">
    <input class="sinput" id="searchQ" placeholder="검색어를 입력하세요..." autocomplete="off">
    <div class="sinfo" id="sinfo"><span>데이터 로드 중...</span><span id="idxStatus"></span></div>
  </div>
  <div class="cat-scroll" id="catBar"></div>
  <div class="cards-wrap" id="cardsWrap"></div>
</div>

<div id="right">
  <canvas id="matrix-rain"></canvas>
  <div class="toolbar">
    <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
    <div class="tb-title" id="tbTitle">시스템 연결 대기 중...</div>
    <div style="display:flex; gap:8px;">
      <button class="tbtn tbtn-ai" onclick="toggleAI()">✨ AI 상담</button>
      <button class="tbtn" onclick="changePdfPage(-1)">◀</button>
      <span style="font-size:12px; color:var(--lt3); min-width:50px; text-align:center;"><span id="curPg">1</span> / <span id="totPg">—</span></span>
      <button class="tbtn" onclick="changePdfPage(1)">▶</button>
    </div>
  </div>
  <div id="cvwrap">
    <div id="loading">
      <div id="loadingUI">
        <div class="spin"></div>
        <div style="color:var(--mg); font-family:monospace; margin-top:10px; font-size:12px;">SYSTEM BOOTING...</div>
      </div>
      <!-- 보안 환경 대응용 수동 복구 UI -->
      <div id="recoveryUI" style="display:none;">
        <div class="recovery-box">
          <div style="color:var(--la); font-weight:700; margin-bottom:10px; font-size:18px;">보안 시스템 연동 필요</div>
          <div style="font-size:13px; color:var(--lt2); line-height:1.6;">
            현재 미리보기 환경에서는 보안상 파일을 자동으로 가져오지 못합니다.<br>
            저장소에 올리신 <b>laws.pdf</b> 파일을 직접 한 번만 선택해 주세요.
          </div>
          <button class="recovery-btn" onclick="document.getElementById('pdfInput').click()">📂 laws.pdf 파일 연결</button>
          <input type="file" id="pdfInput" style="display:none" accept=".pdf" onchange="handleManualPdf(this)">
          
          <div style="margin-top:20px; font-size:11px; color:var(--lt3);">
            (본문 검색을 위해 <b>laws_data.json</b>도 필요할 수 있습니다.)
          </div>
          <button class="recovery-btn" style="background:var(--lbg3); color:var(--lt1); padding:8px 16px; font-size:12px;" onclick="document.getElementById('jsonInput').click()">📂 laws_data.json 연결 (선택)</button>
          <input type="file" id="jsonInput" style="display:none" accept=".json" onchange="handleManualJson(this)">
        </div>
      </div>
    </div>
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>

<!-- AI Assistant -->
<div id="aiModal">
  <div style="padding:18px; background:var(--lbg2); border-bottom:1px solid var(--lb); display:flex; justify-content:space-between; align-items:center;">
    <span style="font-weight:700; color:var(--ai-purp);">✨ AI 법규 비서</span>
    <button class="tbtn" style="padding:4px 8px;" onclick="toggleAI()">닫기</button>
  </div>
  <div class="ai-chat" id="aiChat" style="flex:1; overflow-y:auto; padding:20px;">
    <div class="ai-bubble ai-bubble-ai">시스템이 준비되었습니다. 질문을 입력하세요.</div>
  </div>
  <div style="padding:15px; border-top:1px solid var(--lb); display:flex; gap:8px;">
    <input type="text" class="sinput" id="aiInput" placeholder="질문하세요...">
    <button class="tbtn tbtn-ai" onclick="askAI()">질문</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

let pdfDoc = null, curPdfPg = 1, scale = 1.3, isRendering = false;

// URL Parsing Fix: Construct absolute URLs based on current context
function getAbsoluteUrl(filename) {
    if (window.location.protocol === 'blob:') {
        // We are in a sandbox, cannot reliably use relative paths with fetch.
        // Return null to trigger recovery mode.
        return null;
    }
    const base = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
    return base + filename;
}

async function initApp() {
    const sinfo = document.getElementById('sinfo');
    const tbTitle = document.getElementById('tbTitle');
    const loadingUI = document.getElementById('loadingUI');
    const recoveryUI = document.getElementById('recoveryUI');

    try {
        const jsonUrl = getAbsoluteUrl('laws_data.json');
        const pdfUrl = getAbsoluteUrl('laws.pdf');

        if (!jsonUrl || !pdfUrl) throw new Error("Sandbox URL mismatch");

        // Load JSON
        const jsonRes = await fetch(jsonUrl + '?t=' + Date.now());
        if(jsonRes.ok) {
            globalJsonData = await jsonRes.json();
            sinfo.innerHTML = `<span>데이터베이스 연결 성공</span><span>✨ AI 준비됨</span>`;
        }

        // Load PDF
        const loadingTask = pdfjsLib.getDocument(pdfUrl);
        pdfDoc = await loadingTask.promise;
        document.getElementById('totPg').textContent = pdfDoc.numPages;
        
        loadingUI.style.display = 'none';
        document.getElementById('pdf-canvas').style.display = 'block';
        tbTitle.innerText = "대한변호사협회 법규집 2026";
        
        renderPage(1);
        initCatBar();
        performSearch();
    } catch (e) {
        console.warn("Auto-loading blocked. Awaiting manual link.", e);
        loadingUI.style.display = 'none';
        recoveryUI.style.display = 'block';
        tbTitle.innerText = "시스템 연결 대기";
        sinfo.innerHTML = `<span style="color:#f44">연결 대기 중</span>`;
        initCatBar();
        performSearch();
    }
}

/* ───────────────────────────────────────────────────
   MANUAL RECOVERY HANDLERS
─────────────────────────────────────────────────── */
async function handleManualPdf(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
        try {
            const buffer = e.target.result;
            const loadingTask = pdfjsLib.getDocument({ data: buffer });
            pdfDoc = await loadingTask.promise;
            document.getElementById('totPg').textContent = pdfDoc.numPages;
            
            document.getElementById('recoveryUI').style.display = 'none';
            document.getElementById('pdf-canvas').style.display = 'block';
            document.getElementById('tbTitle').innerText = "대한변협 법규집 (로컬 연동)";
            renderPage(1);
        } catch(err) { alert("PDF 로드 실패"); }
    };
    reader.readAsArrayBuffer(file);
}

async function handleManualJson(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            globalJsonData = JSON.parse(e.target.result);
            document.getElementById('sinfo').innerHTML = `<span>DB 수동 연결 성공</span><span>✨ AI 엔진 활성</span>`;
            performSearch();
        } catch(err) { alert("JSON 파싱 실패"); }
    };
    reader.readAsText(file);
}

/* ───────────────────────────────────────────────────
   RENDER & SEARCH
─────────────────────────────────────────────────── */
async function renderPage(pg){
    if(!pdfDoc || isRendering) return;
    isRendering = true; curPdfPg = pg;
    document.getElementById('curPg').textContent = pg;
    try {
        const page = await pdfDoc.getPage(pg);
        const vp = page.getViewport({ scale });
        const cv = document.getElementById('pdf-canvas');
        const ctx = cv.getContext('2d');
        cv.width = vp.width; cv.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
    } catch(e) {}
    isRendering = false;
}

function performSearch() {
    const q = document.getElementById('searchQ').value.trim().toLowerCase();
    const wrap = document.getElementById('cardsWrap');
    wrap.innerHTML = '';

    if(curTab === 0) {
        let filtered = ALL_REGS.filter(r => (activeCat === '전체' || r.cat === activeCat));
        if(q) filtered = filtered.filter(r => r.n.toLowerCase().includes(q));
        filtered.forEach(r => {
            const d = document.createElement('div');
            d.className = 'card' + (curPdfPg === r.p ? ' active' : '');
            d.innerHTML = `<div class="card-pg">P.${r.p}</div><div class="card-name">${r.n}</div>`;
            d.onclick = () => { renderPage(r.p); document.getElementById('tbTitle').innerText = r.n; updateActive(d); };
            wrap.appendChild(d);
        });
    } else {
        if(globalJsonData.length === 0) {
            wrap.innerHTML = '<div style="color:var(--lt3); text-align:center; padding:40px;">본문 데이터베이스가 연결되지 않았습니다.</div>';
            return;
        }
        if(!q) { wrap.innerHTML = '<div style="color:var(--lt3); text-align:center; padding:40px;">검색어를 입력하세요.</div>'; return; }

        const results = globalJsonData.filter(item => item.content.toLowerCase().includes(q)).slice(0, 30);
        results.forEach(r => {
            const d = document.createElement('div');
            d.className = 'card';
            const idx = r.content.toLowerCase().indexOf(q);
            const snip = "..." + r.content.substring(Math.max(0, idx - 40), Math.min(r.content.length, idx + 60)) + "...";
            let regName = "조문";
            for(let i=0; i<ALL_REGS.length; i++) {
                if(r.page >= ALL_REGS[i].p && (i+1 === ALL_REGS.length || r.page < ALL_REGS[i+1].p)) { regName = ALL_REGS[i].n; break; }
            }
            d.innerHTML = `<div class="card-pg">PAGE ${r.page}</div><div class="card-name">${regName}</div><div style="font-size:11.5px;color:var(--lt3);margin-top:8px;line-height:1.4;">${snip.replace(new RegExp(q, 'gi'), m => `<b style="color:var(--lgold)">${m}</b>`)}</div>`;
            d.onclick = () => { renderPage(r.page); document.getElementById('tbTitle').innerText = regName; };
            wrap.appendChild(d);
        });
        if(results.length === 0) wrap.innerHTML = '<div style="color:var(--lt3); text-align:center; padding:40px;">일치하는 내용이 없습니다.</div>';
    }
}

/* AI LOGIC */
async function askAI() {
    const input = document.getElementById('aiInput');
    const chat = document.getElementById('aiChat');
    const q = input.value.trim(); if(!q) return;

    input.value = '';
    chat.innerHTML += `<div class="ai-bubble ai-bubble-user">${q}</div>`;
    chat.innerHTML += `<div class="ai-bubble ai-bubble-ai" id="aiTemp">✨ 최적의 조문을 분석 중입니다...</div>`;
    chat.scrollTop = chat.scrollHeight;

    let context = "";
    if (globalJsonData.length > 0) {
        const keywords = q.split(' ').filter(w => w.length > 1);
        let matchPool = [];
        globalJsonData.forEach(item => {
            let score = 0;
            keywords.forEach(k => { if(item.content.includes(k)) score++; });
            if(score > 0) matchPool.push({pg: item.page, txt: item.content.substring(0, 800), score});
        });
        matchPool.sort((a,b) => b.score - a.score).slice(0, 4).forEach(m => {
            context += `[Page ${m.pg}]: ${m.txt}\n\n`;
        });
    }

    const prompt = `법규집 발췌 데이터:\n${context}\n질문: ${q}\n위 데이터를 바탕으로 친절하게 답변하세요. 근거 페이지를 꼭 명시하세요.`;
    const ans = await callGemini(prompt);
    document.getElementById('aiTemp').innerHTML = ans.replace(/\n/g, '<br>');
    document.getElementById('aiTemp').id = '';
    chat.scrollTop = chat.scrollHeight;
}

async function callGemini(q) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
    try {
        const res = await fetch(url, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contents: [{ parts: [{ text: q }] }], systemInstruction: { parts: [{ text: "대한변협 법규 비서입니다. 한국어로 답변하세요." }] } })
        });
        const data = await res.json();
        return data.candidates[0].content.parts[0].text;
    } catch(e) { return "AI 통신 실패"; }
}

/* MATRIX RAIN */
function initMatrix() {
    const canvas = document.getElementById('matrix-rain');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const CHARS = 'アイウエ오0123456789法規則定條章協會辯護士倫리징계등록';
    const FONT_SIZE = 14;
    let cols, drops;
    function resize() { canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight; cols = Math.floor(canvas.width / FONT_SIZE); drops = Array.from({length: cols}, () => Math.random() * -100); }
    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.font = FONT_SIZE + 'px monospace';
        for(let i = 0; i < drops.length; i++) {
            const text = CHARS[Math.floor(Math.random() * CHARS.length)];
            ctx.shadowBlur = 10; ctx.shadowColor = '#00ff41'; ctx.fillStyle = '#ffffff';
            ctx.fillText(text, i * FONT_SIZE, drops[i] * FONT_SIZE);
            ctx.shadowBlur = 0; ctx.fillStyle = '#00ff41';
            ctx.fillText(text, i * FONT_SIZE, (drops[i]-1) * FONT_SIZE);
            if(drops[i] * FONT_SIZE > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
        requestAnimationFrame(draw);
    }
    resize(); window.addEventListener('resize', resize); requestAnimationFrame(draw);
}

window.onload = () => { initApp(); initMatrix(); };
document.getElementById('searchQ').oninput = () => { clearTimeout(searchTimeout); searchTimeout = setTimeout(performSearch, 200); };
document.getElementById('aiInput').onkeydown = e => { if(e.key === 'Enter') askAI(); };
